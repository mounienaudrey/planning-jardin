<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Jardin Pro</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

h1 {
  text-align: center;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  font-size: 16px;
}

button {
  background: green;
  color: white;
  border: none;
}

.carte {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.supprimer {
  background: red;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>🌿 Planning Jardin PRO</h1>

<input type="text" id="client" placeholder="Nom du client">
<input type="text" id="tel" placeholder="Téléphone">
<input type="text" id="adresse" placeholder="Adresse">
<input type="date" id="date">
<input type="time" id="heure">
<input type="text" id="prestation" placeholder="Type (tonte, taille...)">

<button onclick="ajouter()">Ajouter</button>

<div id="planning"></div>

<script>

let liste = JSON.parse(localStorage.getItem("planning")) || [];

function afficher() {
  const planning = document.getElementById("planning");
  planning.innerHTML = "";

  liste.sort((a, b) => new Date(a.date + " " + a.heure) - new Date(b.date + " " + b.heure));

  liste.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "carte";

    div.innerHTML = `
      <strong>${item.date} à ${item.heure}</strong><br>
      👤 ${item.client}<br>
      📞 ${item.tel}<br>
      📍 ${item.adresse}<br>
      🌿 ${item.prestation}
      <button class="supprimer" onclick="supprimer(${index})">Supprimer</button>
    `;

    planning.appendChild(div);
  });

  localStorage.setItem("planning", JSON.stringify(liste));
}

function ajouter() {
  const client = document.getElementById("client").value;
  const tel = document.getElementById("tel").value;
  const adresse = document.getElementById("adresse").value;
  const date = document.getElementById("date").value;
  const heure = document.getElementById("heure").value;
  const prestation = document.getElementById("prestation").value;

  if (!date || !prestation) {
    alert("Date et prestation obligatoires !");
    return;
  }

  liste.push({ client, tel, adresse, date, heure, prestation });

  document.getElementById("client").value = "";
  document.getElementById("tel").value = "";
  document.getElementById("adresse").value = "";
  document.getElementById("date").value = "";
  document.getElementById("heure").value = "";
  document.getElementById("prestation").value = "";

  afficher();
}

function supprimer(index) {
  liste.splice(index, 1);
  afficher();
}

afficher();

</script>

</body>
</html>
