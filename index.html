<!DOCTYPE html>
<html lang="fr">
  <script src="https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fcdnjs.cloudflare.com%2Fajax%2Flibs%2Fjspdf%2F2.5.1%2Fjspdf.umd.min.js&data=05%7C02%7C%7C4ce3a3139d0f4fc5a9e608de950562d5%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639112047527125199%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=CSRKvONkzdyW4KntOb4iuKTvo8EhK8dw1he6%2Fvg59Co%3D&reserved=0"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Jardin PRO+</title>

<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }

input, button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
}

button { background: green; color: white; border: none; }

.carte {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.actions button {
  margin-top: 5px;
  background: #333;
}

.supprimer { background: red; }
.facture { background: blue; }
.gps { background: orange; }
</style>
</head>

<body>

<h2>🌿 Planning Jardin PRO+</h2>

<input id="client" placeholder="Nom client">
<input id="tel" placeholder="Téléphone">
<input id="adresse" placeholder="Adresse">
<input type="date" id="date">
<input type="time" id="heure">
<input id="prestation" placeholder="Prestation">
<input id="prix" placeholder="Prix (€)">

<button onclick="ajouter()">Ajouter</button>

<div id="planning"></div>

<script>

let liste = JSON.parse(localStorage.getItem("planning")) || [];

function ajouter() {
  let client = document.getElementById("client").value;
  let tel = document.getElementById("tel").value;
  let adresse = document.getElementById("adresse").value;
  let date = document.getElementById("date").value;
  let heure = document.getElementById("heure").value;
  let prestation = document.getElementById("prestation").value;
  let prix = document.getElementById("prix").value;

  if (!date || !prestation) {
    alert("Date et prestation obligatoires !");
    return;
  }

  liste.push({ client, tel, adresse, date, heure, prestation, prix });

  localStorage.setItem("planning", JSON.stringify(liste));

  document.querySelectorAll("input").forEach(i => i.value = "");

  afficher();
}

function afficher() {
  let planning = document.getElementById("planning");
  planning.innerHTML = "";

  liste.sort((a, b) => new Date(a.date + " " + a.heure) - new Date(b.date + " " + b.heure));

  liste.forEach((item, index) => {

    let div = document.createElement("div");
    div.className = "carte";

    div.innerHTML = `
      <strong>${item.date} ${item.heure}</strong><br>
      👤 ${item.client}<br>
      📞 ${item.tel}<br>
      📍 ${item.adresse}<br>
      🌿 ${item.prestation}<br>
      💰 ${item.prix} €

      <div class="actions">
        <button class="gps" onclick="gps('${item.adresse}')">📍 GPS</button>
        <button class="facture" onclick="facture(${index})">🧾 Facture</button>
        <button class="supprimer" onclick="supprimer(${index})">❌ Supprimer</button>
      </div>
    `;

    planning.appendChild(div);
  });
}

function supprimer(index) {
  liste.splice(index, 1);
  localStorage.setItem("planning", JSON.stringify(liste));
  afficher();
}

function gps(adresse) {
  let url = "https://emea01.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.google.com%2Fmaps%2Fsearch%2F%3Fapi%3D1%26query%3D&data=05%7C02%7C%7Cc712f0bc967147c449bd08de948bc4cd%7C84df9e7fe9f640afb435aaaaaaaaaaaa%7C1%7C0%7C639111525201144377%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=t0WUeYgIVbGbMHl3I53ntgaKTlfUW7PmOAXLq%2FIoJvs%3D&reserved=0" + encodeURIComponent(adresse);
  window.open(url, "_blank");
}

function facture(index) {
  let item = liste[index];

  let contenu = `
    FACTURE\n\n
    Client : ${item.client}\n
    Téléphone : ${item.tel}\n
    Adresse : ${item.adresse}\n\n
    Prestation : ${item.prestation}\n
    Date : ${item.date}\n
    Heure : ${item.heure}\n\n
    Montant : ${item.prix} €
  `;

  alert(contenu);
}

afficher();

</script>

</body>
</html>
